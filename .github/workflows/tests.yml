name: Tests

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libopengl0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            xvfb

      - name: Verify EGL runtime
        run: |
          ldconfig -p | grep libEGL

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          xvfb-run -a pytest tests/ --cov=src --cov-report=term-missing

      - name: Run type checks
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          mypy \
            src/gcode \
            src/geometry \
            src/analyzer \
            src/main.py
