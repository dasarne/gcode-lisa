name: Build

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Render icons
        run: |
          python scripts/Render-Ikons.py

      - name: Verify packaging files
        run: |
          ls -R
          test -f ./packaging/gcode-lisa.spec

      - name: Build
        run: |
          pyinstaller ./packaging/gcode-lisa.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcode-lisa-${{ matrix.os }}
          path: dist/

      - name: Archive build
        shell: bash
        run: |
          mkdir -p release-assets

          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "release-assets/gcode-lisa-windows.zip" ./dist/*
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cd dist
            zip -r ../release-assets/gcode-lisa-macos.zip .
          else
            cd dist
            tar -czf ../release-assets/gcode-lisa-linux.tar.gz .
          fi

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
